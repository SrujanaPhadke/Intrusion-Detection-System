{% extends "base.html" %}

{% block title %}Predict From File{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow p-4 rounded-4">
        <h2 class="text-center text-primary mb-4">📂 Predict Intrusion From CSV File</h2>

        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label"><strong>Select CSV File</strong></label>
                <input type="file" name="csv_file" accept=".csv" class="form-control" required>
            </div>

            <div class="text-center mt-3">
                <button class="btn btn-primary px-4 py-2" type="submit">Upload & Predict</button>
            </div>
        </form>

        {% if error_message %}
        <div class="alert alert-danger mt-4">
            {{ error_message }}
        </div>
        {% endif %}

        {% if prediction_results %}
        <h4 class="mt-4 text-success">Prediction Results:</h4>
        <div class="table-responsive mt-3">
            {{ prediction_results|safe }}
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
